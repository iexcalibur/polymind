replicaCount: 1
image:
  repository: ghcr.io/toeverything/polymind
  pullPolicy: IfNotPresent
  tag: ''

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''
# map to NODE_ENV environment variable
env: 'production'
app:
  # POLYMIND_SERVER_SUB_PATH
  path: ''
  # POLYMIND_SERVER_HOST
  host: '0.0.0.0'
  https: true
  
serviceAccount:
  create: true
  annotations: {}
  name: 'polymind-graphql'

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

resources:
  limits:
    cpu: '1'
    memory: 4Gi
  requests:
    cpu: '1'
    memory: 2Gi

probe:
  initialDelaySeconds: 20

nodeSelector: {}
tolerations: []
affinity: {}
