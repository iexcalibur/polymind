replicaCount: 1
image:
  repository: ghcr.io/toeverything/polymind
  pullPolicy: IfNotPresent
  tag: ''

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''
# map to NODE_ENV environment variable
env: 'production'
nodeOptions: '--max-old-space-size=3072'
app:
  # POLYMIND_SERVER_PORT
  port: 3010
  # POLYMIND_SERVER_SUB_PATH
  path: ''
  # POLYMIND_SERVER_HOST
  host: '0.0.0.0'
  https: true
serviceAccount:
  create: true
  annotations: {}
  name: 'polymind-front'

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

resources:
  limits:
    cpu: '1'
    memory: 6Gi
  requests:
    cpu: '1'
    memory: 4Gi

probe:
  initialDelaySeconds: 20
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 6
  successThreshold: 1
  liveness:
    initialDelaySeconds: 60
    failureThreshold: 12
  readiness: {}

services:
  sync:
    name: polymind-sync
    type: ClusterIP
    port: 3010
    annotations:
      cloud.google.com/backend-config: '{"default": "polymind-api-backendconfig"}'
  renderer:
    name: polymind-renderer
    type: ClusterIP
    port: 3000
    annotations:
      cloud.google.com/backend-config: '{"default": "polymind-api-backendconfig"}'
  web:
    name: polymind-web
    type: ClusterIP
    port: 8080
    annotations: {}
  doc:
    type: ClusterIP
    annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
